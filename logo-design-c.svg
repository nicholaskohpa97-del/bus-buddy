<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="badge-clip-c">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
    <linearGradient id="sky-grad-c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c6b65"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="gold-grad-c" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow-c">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="gold-glow-c" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect width="512" height="512" rx="96" fill="url(#sky-grad-c)" clip-path="url(#badge-clip-c)"/>

  <!-- Road -->
  <rect x="0" y="375" width="512" height="137" fill="#065f5a" clip-path="url(#badge-clip-c)"/>
  <!-- Road dashes -->
  <rect x="40" y="395" width="55" height="7" rx="3.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="165" y="395" width="55" height="7" rx="3.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="290" y="395" width="55" height="7" rx="3.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="415" y="395" width="55" height="7" rx="3.5" fill="#F59E0B" opacity="0.4"/>
  <!-- Road top border (gold) -->
  <rect x="0" y="373" width="512" height="4" fill="url(#gold-grad-c)" opacity="0.7"/>

  <!-- Double-decker bus side profile, centred, facing right -->
  <g transform="translate(256, 310)" filter="url(#shadow-c)">
    <!-- Bus lower deck body -->
    <rect x="-195" y="-85" width="390" height="85" rx="10" fill="#ffffff"/>
    <!-- Bus upper deck body -->
    <rect x="-180" y="-180" width="340" height="92" rx="10" fill="#ffffff"/>

    <!-- Teal stripe upper deck -->
    <rect x="-180" y="-155" width="340" height="12" fill="#0d9488"/>
    <!-- Gold stripe lower deck -->
    <rect x="-195" y="-30" width="390" height="8" fill="url(#gold-grad-c)"/>
    <!-- Teal stripe lower deck base -->
    <rect x="-195" y="-85" width="390" height="12" fill="#0d9488"/>

    <!-- Upper deck windows (5) -->
    <rect x="-162" y="-148" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="-100" y="-148" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="-38" y="-148" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="24" y="-148" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="88" y="-148" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <!-- Upper deck front cab window -->
    <rect x="148" y="-175" width="28" height="44" rx="5" fill="#b2eae5" opacity="0.7"/>

    <!-- Lower deck windows (4) -->
    <rect x="-130" y="-72" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="-68" y="-72" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="-6" y="-72" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <rect x="56" y="-72" width="52" height="44" rx="5" fill="#b2eae5" opacity="0.9"/>
    <!-- Front cab lower -->
    <rect x="148" y="-72" width="46" height="44" rx="5" fill="#b2eae5" opacity="0.7"/>

    <!-- Door (rear) -->
    <rect x="-195" y="-72" width="52" height="44" fill="#e8e8e8"/>
    <line x1="-170" y1="-72" x2="-170" y2="-28" stroke="#ccc" stroke-width="2"/>
    <circle cx="-155" cy="-50" r="3.5" fill="#0d9488"/>

    <!-- Front face -->
    <rect x="178" y="-178" width="18" height="178" rx="5" fill="#f0fffe"/>
    <rect x="178" y="-150" width="16" height="28" rx="4" fill="#FFF9C4"/>
    <rect x="178" y="-68" width="16" height="24" rx="4" fill="#FFF9C4"/>
    <rect x="152" y="-8" width="44" height="8" rx="4" fill="#0d9488"/>

    <!-- Brake lights -->
    <rect x="-198" y="-70" width="6" height="22" rx="3" fill="#ef4444"/>
    <rect x="-198" y="-115" width="6" height="20" rx="3" fill="#ef4444"/>

    <!-- Route badge -->
    <rect x="-10" y="-11" width="60" height="18" rx="6" fill="url(#gold-grad-c)"/>
    <text x="20" y="2" text-anchor="middle" fill="#065f5a" font-family="Arial,sans-serif" font-size="11" font-weight="900">BUS 65</text>

    <!-- Wheels -->
    <circle cx="-115" cy="12" r="40" fill="#1a1a1a"/>
    <circle cx="-115" cy="12" r="26" fill="#333"/>
    <circle cx="-115" cy="12" r="14" fill="#555"/>
    <circle cx="-115" cy="12" r="6" fill="#888"/>
    <line x1="-115" y1="-8" x2="-115" y2="-24" stroke="#666" stroke-width="3"/>
    <line x1="-95" y1="12" x2="-79" y2="12" stroke="#666" stroke-width="3"/>
    <line x1="-115" y1="32" x2="-115" y2="48" stroke="#666" stroke-width="3"/>
    <line x1="-135" y1="12" x2="-151" y2="12" stroke="#666" stroke-width="3"/>
    <circle cx="105" cy="12" r="40" fill="#1a1a1a"/>
    <circle cx="105" cy="12" r="26" fill="#333"/>
    <circle cx="105" cy="12" r="14" fill="#555"/>
    <circle cx="105" cy="12" r="6" fill="#888"/>
    <line x1="105" y1="-8" x2="105" y2="-24" stroke="#666" stroke-width="3"/>
    <line x1="125" y1="12" x2="141" y2="12" stroke="#666" stroke-width="3"/>
    <line x1="105" y1="32" x2="105" y2="48" stroke="#666" stroke-width="3"/>
    <line x1="85" y1="12" x2="69" y2="12" stroke="#666" stroke-width="3"/>

    <!-- Wheel arches -->
    <path d="M-162 2 Q-115 -22 -68 2" fill="none" stroke="#0d9488" stroke-width="5" stroke-linecap="round"/>
    <path d="M58 2 Q105 -22 152 2" fill="none" stroke="#0d9488" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- MRT transfer icon top-right -->
  <g transform="translate(418, 80)" opacity="0.55">
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="none" stroke="#FBBF24" stroke-width="2.5"/>
    <text x="0" y="7" text-anchor="middle" fill="#FBBF24" font-family="Arial,sans-serif" font-size="20" font-weight="900">M</text>
  </g>

  <!-- BUS BUDDY wordmark -->
  <text x="256" y="455" text-anchor="middle" fill="#ffffff" font-family="Arial Black,Arial,sans-serif" font-size="46" font-weight="900" letter-spacing="-1.5" filter="url(#gold-glow-c)">BUS BUDDY</text>
  <rect x="90" y="461" width="332" height="3.5" rx="2" fill="url(#gold-grad-c)"/>
  <text x="256" y="490" text-anchor="middle" fill="#FBBF24" font-family="Arial,sans-serif" font-size="13" letter-spacing="5" opacity="0.9">SINGAPORE</text>
</svg>
