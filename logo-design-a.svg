<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="badge-clip-a">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
    <linearGradient id="red-grad-a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8242C"/>
      <stop offset="100%" stop-color="#B01018"/>
    </linearGradient>
    <filter id="shadow-a" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect width="512" height="512" rx="96" fill="url(#red-grad-a)" clip-path="url(#badge-clip-a)"/>

  <!-- White band across middle -->
  <rect x="0" y="290" width="512" height="90" fill="#ffffff"/>

  <!-- Road base -->
  <rect x="0" y="380" width="512" height="132" fill="#C0101A"/>

  <!-- Road lane markings -->
  <rect x="60" y="400" width="60" height="8" rx="4" fill="#ffffff" opacity="0.4"/>
  <rect x="180" y="400" width="60" height="8" rx="4" fill="#ffffff" opacity="0.4"/>
  <rect x="300" y="400" width="60" height="8" rx="4" fill="#ffffff" opacity="0.4"/>
  <rect x="420" y="400" width="60" height="8" rx="4" fill="#ffffff" opacity="0.4"/>

  <!-- Double-decker bus body (front-facing, centred) -->
  <g transform="translate(256, 220)" filter="url(#shadow-a)">
    <!-- Lower deck -->
    <rect x="-130" y="0" width="260" height="100" rx="14" fill="#ffffff"/>
    <!-- Upper deck -->
    <rect x="-120" y="-95" width="240" height="100" rx="14" fill="#ffffff"/>
    <!-- Deck divider strip -->
    <rect x="-130" y="-4" width="260" height="8" fill="#D12028"/>

    <!-- Upper deck windows (3) -->
    <rect x="-90" y="-80" width="60" height="48" rx="6" fill="#AEE6F8" opacity="0.9"/>
    <rect x="-18" y="-80" width="36" height="48" rx="6" fill="#AEE6F8" opacity="0.9"/>
    <rect x="30" y="-80" width="60" height="48" rx="6" fill="#AEE6F8" opacity="0.9"/>

    <!-- Windshield (upper cab) -->
    <rect x="-110" y="-80" width="12" height="48" rx="4" fill="#D12028"/>

    <!-- Destination board -->
    <rect x="-105" y="-95" width="210" height="16" rx="4" fill="#1a1a2e"/>
    <text x="0" y="-83" text-anchor="middle" fill="#FFD700" font-family="Arial,sans-serif" font-size="11" font-weight="bold" letter-spacing="1">BUS BUDDY · SINGAPORE</text>

    <!-- Lower deck windows (4) -->
    <rect x="-108" y="14" width="56" height="44" rx="6" fill="#AEE6F8" opacity="0.9"/>
    <rect x="-42" y="14" width="56" height="44" rx="6" fill="#AEE6F8" opacity="0.9"/>
    <rect x="28" y="14" width="44" height="44" rx="6" fill="#AEE6F8" opacity="0.9"/>
    <rect x="80" y="14" width="40" height="44" rx="6" fill="#AEE6F8" opacity="0.9"/>

    <!-- Door -->
    <rect x="-130" y="14" width="18" height="44" rx="4" fill="#E8E8E8"/>
    <circle cx="-118" cy="36" r="3" fill="#D12028"/>

    <!-- Headlights -->
    <rect x="-130" y="-5" width="14" height="10" rx="3" fill="#FFF176"/>
    <rect x="-130" y="88" width="14" height="10" rx="3" fill="#FFF176"/>

    <!-- Wheels -->
    <circle cx="-82" cy="110" r="28" fill="#333"/>
    <circle cx="-82" cy="110" r="18" fill="#555"/>
    <circle cx="-82" cy="110" r="8" fill="#888"/>
    <circle cx="82" cy="110" r="28" fill="#333"/>
    <circle cx="82" cy="110" r="18" fill="#555"/>
    <circle cx="82" cy="110" r="8" fill="#888"/>

    <!-- Wheel arches -->
    <path d="M-116 100 Q-82 78 -48 100" fill="none" stroke="#D12028" stroke-width="4"/>
    <path d="M48 100 Q82 78 116 100" fill="none" stroke="#D12028" stroke-width="4"/>

    <!-- SBS-style number badge -->
    <rect x="-30" y="72" width="60" height="24" rx="6" fill="#D12028"/>
    <text x="0" y="89" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="bold">SVC 14</text>
  </g>

  <!-- "BUS BUDDY" text on white band -->
  <text x="256" y="348" text-anchor="middle" fill="#D12028" font-family="Arial Black,Arial,sans-serif" font-size="38" font-weight="900" letter-spacing="-1">BUS BUDDY</text>
  <text x="256" y="368" text-anchor="middle" fill="#B01018" font-family="Arial,sans-serif" font-size="13" letter-spacing="4">SINGAPORE</text>

  <!-- Singapore star/crescent hint (top-left corner) -->
  <g transform="translate(44, 56)" opacity="0.25">
    <path d="M0,0 L4,12 L-8,5 L8,5 L-4,12Z" fill="#fff" transform="rotate(0)"/>
  </g>
</svg>
