<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <clipPath id="clip-192">
      <rect width="192" height="192" rx="36" ry="36"/>
    </clipPath>
    <linearGradient id="sky-192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c6b65"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="gold-192" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="sh-192">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <rect width="192" height="192" rx="36" fill="url(#sky-192)" clip-path="url(#clip-192)"/>

  <!-- Road -->
  <rect x="0" y="140" width="192" height="52" fill="#065f5a" clip-path="url(#clip-192)"/>
  <rect x="12" y="148" width="20" height="3" rx="1.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="56" y="148" width="20" height="3" rx="1.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="100" y="148" width="20" height="3" rx="1.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="144" y="148" width="20" height="3" rx="1.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="0" y="139" width="192" height="2" fill="url(#gold-192)" opacity="0.7"/>

  <!-- Double-decker bus -->
  <g transform="translate(96, 116)" filter="url(#sh-192)">
    <!-- Lower deck -->
    <rect x="-73" y="-32" width="146" height="32" rx="4" fill="#fff"/>
    <!-- Upper deck -->
    <rect x="-67" y="-68" width="126" height="34" rx="4" fill="#fff"/>
    <!-- Teal stripe upper -->
    <rect x="-67" y="-59" width="126" height="5" fill="#0d9488"/>
    <!-- Gold stripe lower -->
    <rect x="-73" y="-12" width="146" height="3" fill="url(#gold-192)"/>
    <!-- Teal stripe lower base -->
    <rect x="-73" y="-32" width="146" height="5" fill="#0d9488"/>

    <!-- Upper windows (4) -->
    <rect x="-60" y="-56" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="-34" y="-56" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="-8" y="-56" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="18" y="-56" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="44" y="-56" width="16" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>

    <!-- Lower windows (3) -->
    <rect x="-50" y="-28" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="-24" y="-28" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="2" y="-28" width="20" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>
    <rect x="28" y="-28" width="18" height="16" rx="2" fill="#b2eae5" opacity="0.9"/>

    <!-- Front cab -->
    <rect x="59" y="-66" width="14" height="66" rx="4" fill="#f0fffe"/>
    <rect x="60" y="-56" width="12" height="10" rx="2" fill="#FFF9C4"/>
    <rect x="60" y="-26" width="12" height="9" rx="2" fill="#FFF9C4"/>

    <!-- Door -->
    <rect x="-73" y="-28" width="18" height="16" fill="#e8e8e8"/>
    <line x1="-64" y1="-28" x2="-64" y2="-12" stroke="#ccc" stroke-width="1"/>

    <!-- Brake lights -->
    <rect x="-75" y="-26" width="3" height="8" rx="1.5" fill="#ef4444"/>
    <rect x="-75" y="-46" width="3" height="8" rx="1.5" fill="#ef4444"/>

    <!-- Wheels -->
    <circle cx="-43" cy="5" r="15" fill="#1a1a1a"/>
    <circle cx="-43" cy="5" r="9" fill="#333"/>
    <circle cx="-43" cy="5" r="4" fill="#555"/>
    <circle cx="35" cy="5" r="15" fill="#1a1a1a"/>
    <circle cx="35" cy="5" r="9" fill="#333"/>
    <circle cx="35" cy="5" r="4" fill="#555"/>

    <!-- Wheel arches -->
    <path d="M-60 0 Q-43 -9 -26 0" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M18 0 Q35 -9 52 0" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- BUS BUDDY text -->
  <text x="96" y="174" text-anchor="middle" fill="#ffffff" font-family="Arial Black,Arial,sans-serif" font-size="16" font-weight="900" letter-spacing="-0.5">BUS BUDDY</text>
  <rect x="28" y="177" width="136" height="1.5" rx="1" fill="url(#gold-192)"/>
</svg>
