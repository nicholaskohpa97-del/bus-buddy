<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="badge-clip-b">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
    <linearGradient id="navy-grad-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001F6B"/>
      <stop offset="100%" stop-color="#003DA5"/>
    </linearGradient>
    <linearGradient id="bus-glow-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow-b" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-text-b" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect width="512" height="512" rx="96" fill="url(#navy-grad-b)" clip-path="url(#badge-clip-b)"/>

  <!-- Star field background dots -->
  <circle cx="60" cy="50" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="420" cy="80" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="480" cy="30" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="90" cy="160" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="450" cy="150" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="30" cy="300" r="1" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="490" cy="280" r="1.5" fill="#2dd4bf" opacity="0.5"/>
  <circle cx="150" cy="60" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="360" cy="40" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="250" cy="30" r="1" fill="#2dd4bf" opacity="0.5"/>

  <!-- Speed lines (motion blur effect) -->
  <rect x="20" y="210" width="80" height="3" rx="1.5" fill="#2dd4bf" opacity="0.15"/>
  <rect x="20" y="225" width="55" height="2" rx="1" fill="#2dd4bf" opacity="0.1"/>
  <rect x="20" y="238" width="70" height="2" rx="1" fill="#2dd4bf" opacity="0.12"/>
  <rect x="20" y="250" width="40" height="2" rx="1" fill="#2dd4bf" opacity="0.08"/>

  <!-- Road / ground line -->
  <rect x="0" y="360" width="512" height="4" rx="2" fill="#2dd4bf" opacity="0.3"/>
  <rect x="0" y="360" width="512" height="152" fill="#00123A"/>

  <!-- Road markings -->
  <rect x="40" y="380" width="50" height="6" rx="3" fill="#2dd4bf" opacity="0.2"/>
  <rect x="160" y="380" width="50" height="6" rx="3" fill="#2dd4bf" opacity="0.2"/>
  <rect x="280" y="380" width="50" height="6" rx="3" fill="#2dd4bf" opacity="0.2"/>
  <rect x="400" y="380" width="50" height="6" rx="3" fill="#2dd4bf" opacity="0.2"/>

  <!-- Bus side profile (glowing teal, facing right) -->
  <g transform="translate(256, 280)" filter="url(#glow-b)">
    <!-- Bus body lower -->
    <rect x="-180" y="-80" width="360" height="80" rx="8" fill="url(#bus-glow-b)" opacity="0.15"/>
    <rect x="-180" y="-80" width="360" height="80" rx="8" fill="none" stroke="url(#bus-glow-b)" stroke-width="2.5"/>

    <!-- Bus body upper deck -->
    <rect x="-170" y="-165" width="320" height="82" rx="8" fill="url(#bus-glow-b)" opacity="0.1"/>
    <rect x="-170" y="-165" width="320" height="82" rx="8" fill="none" stroke="url(#bus-glow-b)" stroke-width="2.5"/>

    <!-- Deck join line -->
    <rect x="-180" y="-84" width="360" height="6" fill="#2dd4bf" opacity="0.4"/>

    <!-- Upper deck windows (5) -->
    <rect x="-148" y="-152" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="-88" y="-152" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="-28" y="-152" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="32" y="-152" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="92" y="-152" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>

    <!-- Lower deck windows (4) + door -->
    <rect x="-180" y="-72" width="32" height="50" rx="4" fill="#2dd4bf" opacity="0.15"/>
    <line x1="-164" y1="-72" x2="-164" y2="-22" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
    <rect x="-136" y="-68" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="-76" y="-68" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="-16" y="-68" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="44" y="-68" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>
    <rect x="104" y="-68" width="50" height="46" rx="4" fill="#2dd4bf" opacity="0.25"/>

    <!-- Destination board -->
    <rect x="-170" y="-170" width="320" height="10" rx="3" fill="#0d9488" opacity="0.6"/>

    <!-- Front (right) -->
    <rect x="148" y="-155" width="32" height="155" rx="6" fill="url(#bus-glow-b)" opacity="0.2"/>
    <rect x="148" y="-155" width="32" height="155" rx="6" fill="none" stroke="#2dd4bf" stroke-width="2.5"/>
    <!-- Headlight -->
    <rect x="162" y="-140" width="16" height="30" rx="4" fill="#FFF176" opacity="0.9"/>

    <!-- Rear (left) -->
    <rect x="-180" y="-165" width="8" height="165" rx="4" fill="#2dd4bf" opacity="0.5"/>
    <!-- Brake light -->
    <rect x="-178" y="-70" width="6" height="20" rx="3" fill="#ef4444" opacity="0.8"/>

    <!-- Wheels -->
    <circle cx="-110" cy="10" r="36" fill="#001F6B" stroke="#2dd4bf" stroke-width="2.5"/>
    <circle cx="-110" cy="10" r="22" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-110" cy="10" r="8" fill="#2dd4bf" opacity="0.6"/>

    <circle cx="90" cy="10" r="36" fill="#001F6B" stroke="#2dd4bf" stroke-width="2.5"/>
    <circle cx="90" cy="10" r="22" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
    <circle cx="90" cy="10" r="8" fill="#2dd4bf" opacity="0.6"/>
  </g>

  <!-- SMRT-style route badge -->
  <rect x="196" y="375" width="120" height="30" rx="8" fill="#2dd4bf" opacity="0.15"/>
  <rect x="196" y="375" width="120" height="30" rx="8" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
  <text x="256" y="396" text-anchor="middle" fill="#2dd4bf" font-family="Arial,sans-serif" font-size="12" font-weight="bold" letter-spacing="1">SMRT · LINE 852</text>

  <!-- "BUS BUDDY" text -->
  <text x="256" y="450" text-anchor="middle" fill="#ffffff" font-family="Arial Black,Arial,sans-serif" font-size="42" font-weight="900" letter-spacing="-1" filter="url(#glow-text-b)">BUS BUDDY</text>
  <rect x="106" y="456" width="300" height="2.5" rx="1.5" fill="#2dd4bf" opacity="0.8"/>
  <text x="256" y="480" text-anchor="middle" fill="#2dd4bf" font-family="Arial,sans-serif" font-size="12" letter-spacing="5" opacity="0.8">SINGAPORE</text>
</svg>
